<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Company Salesforce Login</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Trebuchet MS", Tahoma, sans-serif;
}

.hero {
    position: relative;
    width: 100%;
    height: 100vh;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;
    background: #ba0c2f;
    color: white;
    padding: 20px;
    border-radius: 10px;
}

.overlay h1 {
    margin: 0;
    font-size: 28px;
}

.overlay p {
    margin-top: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="hero">
    <img src="BT_Building2.jpg" alt="Office Headquarters">

    <div class="overlay">
        <h1>Welcome</h1>
        <p>Secure Salesforce Access</p>
    </div>
</div>

</body>
</html>
